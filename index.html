<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Todo llega — a contemplative landing page where a single phrase drifts across eighteen languages." />
  <title>Todo llega · Everything comes</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://www.everythingcomes.com/" />
  <meta property="og:title"       content="Todo llega · Everything comes" />
  <meta property="og:description" content="A contemplative page where a single phrase drifts across eighteen languages." />

  <!-- Atropos.js base styles (CDN) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/atropos@2/atropos.min.css"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Decorative full-screen canvas for the sakura petal animation -->
  <canvas id="sakura-canvas" aria-hidden="true"></canvas>

  <!-- ── Page controls (top-right) ────────────────────────── -->
  <div class="controls" role="group" aria-label="Page controls">

    <!-- Audio toggle — off by default, no autoplay -->
    <button
      class="controls__btn"
      id="btn-audio"
      aria-label="Play ambient audio"
      title="Toggle ambient audio"
    >
      <!-- Muted state (default) -->
      <svg class="icon-audio-off" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
        <path d="M5 8H3v4h2l4 3V5L5 8z"/>
        <line x1="13" y1="8" x2="17" y2="12"/>
        <line x1="17" y1="8" x2="13" y2="12"/>
      </svg>
      <!-- Playing state -->
      <svg class="icon-audio-on" viewBox="0 0 20 20" aria-hidden="true" focusable="false" hidden>
        <path d="M5 8H3v4h2l4 3V5L5 8z"/>
        <path d="M13.5 8.5a2.5 2.5 0 0 1 0 3"/>
        <path d="M15.5 6.5a5 5 0 0 1 0 7"/>
      </svg>
    </button>

    <!-- Fullscreen toggle -->
    <button
      class="controls__btn"
      id="btn-fullscreen"
      aria-label="Enter fullscreen"
      title="Toggle fullscreen"
    >
      <!-- Enter fullscreen -->
      <svg class="icon-fs-enter" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
        <path d="M3 8V3h5M17 8V3h-5M3 12v5h5M17 12v5h-5"/>
      </svg>
      <!-- Exit fullscreen -->
      <svg class="icon-fs-exit" viewBox="0 0 20 20" aria-hidden="true" focusable="false" hidden>
        <path d="M8 3v5H3M12 3v5h5M8 17v-5H3M12 17v-5h5"/>
      </svg>
    </button>

  </div>

  <!-- Ambient audio — no autoplay, no controls -->
  <audio id="ambient-audio" loop preload="none">
    <source src="audio/sakura.mp3" type="audio/mpeg" />
  </audio>

  <!-- ── Main content ─────────────────────────────────────── -->
  <main class="hero">
    <!--
      Atropos.js requires this exact four-level div structure.
      The inner `.atropos-inner` fills the wrapper absolutely,
      so the wrapper (#hero-atropos) carries the explicit dimensions.

      Elements with data-atropos-offset receive layered depth
      on hover — positive values come towards the viewer.
    -->
    <div class="atropos" id="hero-atropos">
      <div class="atropos-scale">
        <div class="atropos-rotate">
          <div class="atropos-inner hero__card">

            <!--
              aria-live="polite" + aria-atomic="true":
              screen readers announce the full phrase each time it changes.
            -->
            <div
              class="hero__text-container"
              aria-live="polite"
              aria-atomic="true"
            >
              <p
                id="rotating-text"
                class="hero__phrase"
                lang="es"
                data-atropos-offset="4"
              >Todo llega</p>
            </div>

            <p
              class="hero__subtext"
              aria-label="Everything comes"
              data-atropos-offset="1.5"
            >· everything comes ·</p>

          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- ── Credits ───────────────────────────────────────────── -->
  <footer class="credits" aria-label="Attribution">
    <span>© <span id="credits-year"></span> David Carvajal Garrido</span>
    <span class="credits__sep" aria-hidden="true"> · </span>
    <span class="credits__audio">music:
      <a
        href="https://freesound.org/s/746451/"
        target="_blank"
        rel="noopener noreferrer"
        title="Sakura (Cherry Blossoms) by GregorQuendel — CC BY-NC 4.0"
      >GregorQuendel</a>
      <span class="credits__license">(CC BY-NC 4.0)</span>
    </span>
  </footer>

  <!-- Atropos.js (CDN) — must be loaded before main.js -->
  <script src="https://cdn.jsdelivr.net/npm/atropos@2/atropos.min.js"></script>
  <script src="main.js"></script>

</body>
</html>
